<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Sign Up - EduFlow</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="d-flex align-items-center justify-content-center min-vh-100" style="background: var(--bg-dark);">
        <div class="login-card">
            <!-- Tab Navigation -->
            <ul class="nav nav-tabs border-0 mb-4" role="tablist" style="background:transparent;">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active text-white" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-content" type="button" role="tab">Sign In</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link text-white" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup-content" type="button" role="tab">Sign Up</button>
                </li>
            </ul>

            <!-- Tab Contents -->
            <div class="tab-content">
                <!-- LOGIN TAB -->
                <div class="tab-pane fade show active" id="login-content" role="tabpanel">
                    <div class="text-center mb-4">
                        <div class="edu-avatar edu-avatar-lg float-anim mb-3" style="margin-left:auto;margin-right:auto;background:linear-gradient(135deg,#6c63ff,#4f46e5)">
                            <i class="bi bi-mortarboard-fill fs-4"></i>
                        </div>
                        <h3 class="font-display text-white fw-bold mb-2">Welcome Back</h3>
                        <p style="color:var(--text-muted);">Sign in to your account</p>
                    </div>

                    <form id="login-form" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label for="login-email" class="form-label text-white" style="font-size:.9rem;font-weight:500;">Email</label>
                            <input type="email" class="edu-input" id="login-email" placeholder="your@email.com" required />
                        </div>

                        <div class="mb-3">
                            <label for="login-password" class="form-label text-white" style="font-size:.9rem;font-weight:500;">Password</label>
                            <div class="position-relative">
                                <input type="password" class="edu-input" id="login-password" placeholder="••••••" required />
                                <button type="button" class="btn p-0" style="position:absolute;right:10px;top:0;color:var(--text-muted);" onclick="togglePasswordVisibility('login-password')">
                                    <i class="bi bi-eye" id="login-eye-icon"></i>
                                </button>
                            </div>
                        </div>

                        <div id="login-error-message" class="alert alert-danger py-2 px-3" style="display:none;font-size:.85rem;"></div>

                        <button type="submit" class="btn-edu-primary btn w-100 py-2 mt-3">
                            <span id="login-btn-text">Sign In</span>
                            <span id="login-btn-loader" style="display:none;">
                                <i class="bi bi-arrow-repeat spin"></i> Signing in...
                            </span>
                        </button>
                    </form>
                </div>

                <!-- SIGNUP TAB -->
                <div class="tab-pane fade" id="signup-content" role="tabpanel">
                    <div class="text-center mb-4">
                        <h3 class="font-display text-white fw-bold mb-2">Create Account</h3>
                        <p style="color:var(--text-muted);">Join EduFlow today</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white" style="font-size:.9rem;font-weight:500;">I am a:</label>
                        <div class="d-flex gap-2">
                            <button type="button" class="role-btn flex-fill" id="student-role-btn" onclick="selectSignupRole('student')" style="background:rgba(108,99,255,.15);border:2px solid #6c63ff;">
                                <i class="bi bi-person-check"></i>
                                <div>
                                    <strong>Student</strong>
                                </div>
                            </button>
                            <button type="button" class="role-btn flex-fill" id="teacher-role-btn" onclick="selectSignupRole('teacher')" style="background:transparent;border:2px solid var(--border);">
                                <i class="bi bi-person-workspace"></i>
                                <div>
                                    <strong>Teacher</strong>
                                </div>
                            </button>
                        </div>
                    </div>

                    <form id="signup-form" onsubmit="handleSignup(event)">
                        <div class="mb-3">
                            <label for="signup-name" class="form-label text-white" style="font-size:.9rem;font-weight:500;">Full Name</label>
                            <input type="text" class="edu-input" id="signup-name" placeholder="John Doe" required />
                        </div>

                        <div class="mb-3">
                            <label for="signup-email" class="form-label text-white" style="font-size:.9rem;font-weight:500;">Email</label>
                            <input type="email" class="edu-input" id="signup-email" placeholder="your@email.com" required />
                        </div>

                        <div id="signup-subject-field" class="mb-3" style="display:none;">
                            <label for="signup-subject" class="form-label text-white" style="font-size:.9rem;font-weight:500;">Subject (for teachers)</label>
                            <input type="text" class="edu-input" id="signup-subject" placeholder="e.g., Mathematics, Physics" />
                        </div>

                        <div class="mb-3">
                            <label for="signup-password" class="form-label text-white" style="font-size:.9rem;font-weight:500;">Password</label>
                            <div class="position-relative">
                                <input type="password" class="edu-input" id="signup-password" placeholder="••••••" required />
                                <button type="button" class="btn p-0" style="position:absolute;right:10px;top:0;color:var(--text-muted);" onclick="togglePasswordVisibility('signup-password')">
                                    <i class="bi bi-eye" id="signup-eye-icon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="signup-confirm-password" class="form-label text-white" style="font-size:.9rem;font-weight:500;">Confirm Password</label>
                            <input type="password" class="edu-input" id="signup-confirm-password" placeholder="••••••" required />
                        </div>

                        <div id="signup-error-message" class="alert alert-danger py-2 px-3" style="display:none;font-size:.85rem;"></div>

                        <button type="submit" class="btn-edu-primary btn w-100 py-2 mt-3">
                            <span id="signup-btn-text">Create Account</span>
                            <span id="signup-btn-loader" style="display:none;">
                                <i class="bi bi-arrow-repeat spin"></i> Creating...
                            </span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <style>
        .spin {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        .nav-link {
            border: none;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            padding-bottom: 1rem;
            color: var(--text-muted) !important;
            transition: all 0.3s ease;
        }
        
        .nav-link.active {
            border-bottom: 2px solid var(--primary);
            color: white !important;
        }
        
        .role-btn {
            padding: 1rem;
            border-radius: 0.5rem;
            border: 2px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.3s ease;
            color: white !important;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .role-btn:hover {
            border-color: var(--primary);
            background: rgba(108, 99, 255, 0.1);
        }
        
        .role-btn strong {
            color: white;
        }
    </style>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="api-client.js"></script>
    <!-- Auth JS -->
    <script src="auth-new.js"></script>
</body>

</html>
